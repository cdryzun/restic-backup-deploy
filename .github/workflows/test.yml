name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh
          ls -la scripts/

      - name: Run full integration test
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/test.sh 2>&1 | tee test-output.log
        env:
          TERM: xterm-256color

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test-output.log
          retention-days: 7

  lint:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning
          format: gcc
        continue-on-error: true

      - name: Check script syntax
        run: |
          bash -n scripts/server.sh && echo "server.sh: OK"
          bash -n scripts/client.sh && echo "client.sh: OK"
          bash -n scripts/test.sh   && echo "test.sh: OK"
