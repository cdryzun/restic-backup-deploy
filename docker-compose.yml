services:
  rest-server:
    image: restic/rest-server:latest
    container_name: restic-rest-server
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - PASSWORD_FILE=/data/.htpasswd
      - OPTIONS=${OPTIONS:---prometheus}
    volumes:
      - ./data:/data
      - ./certs:/certs:ro
    ports:
      - "${RESTIC_PORT:-8000}:8000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          if echo "$${OPTIONS}" | grep -q -- '--tls'; then
            wget --spider --no-check-certificate https://localhost:8000/ 2>&1 | grep -q "remote file exists"
          else
            wget --spider http://localhost:8000/ 2>&1 | grep -q "remote file exists" || \
            wget --spider http://localhost:8000/ 2>&1 | grep -q "401 Unauthorized"
          fi
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backup-net

  prometheus:
    image: prom/prometheus:latest
    container_name: restic-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # metrics_password 文件供 prometheus.yml basic_auth.password_file 使用
      # 若 rest-server 启用了 --prometheus-no-auth，可删除此行及 prometheus.yml 中的 basic_auth 块
      - ./config/metrics_password:/etc/prometheus/metrics_password:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      rest-server:
        condition: service_healthy
    networks:
      - backup-net

  grafana:
    image: grafana/grafana:latest
    container_name: restic-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme_grafana}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:${GRAFANA_PORT:-3000}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - backup-net

networks:
  backup-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
